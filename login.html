<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>ABCL — Login</title>
  <link rel="stylesheet" href="css/abcl.css" />
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; background: radial-gradient(ellipse 80% 60% at 50% 80%, rgba(64,145,108,.12) 0%, transparent 70%), var(--n900); }

    .login-wrap { width: 100%; max-width: 400px; animation: fadeUp .5s ease; }

    .login-logo { display: flex; align-items: center; gap: .85rem; justify-content: center; margin-bottom: 2.5rem; }
    .login-logo img { width: 52px; height: 52px; object-fit: contain; filter: drop-shadow(0 2px 10px rgba(0,0,0,.5)); }
    .login-logo-text { font-family: var(--font-display); font-size: 1.1rem; font-weight: 800; color: var(--g300); line-height: 1.2; }
    .login-logo-text small { display: block; font-size: .62rem; font-weight: 400; color: var(--n200); letter-spacing: .05em; }

    .login-card { background: var(--n800); border: 1px solid var(--borda); border-radius: var(--radius-lg); padding: 2.5rem; }

    .login-card h1 { font-family: var(--font-display); font-size: 1.3rem; font-weight: 800; margin-bottom: .25rem; }
    .login-card p  { font-size: .82rem; color: var(--n200); margin-bottom: 2rem; }

    .error-box {
      background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.25);
      border-radius: var(--radius-sm); padding: .65rem 1rem;
      font-size: .8rem; color: #fca5a5; margin-bottom: 1.25rem; display: none;
    }

    .form-stack { display: flex; flex-direction: column; gap: .85rem; }

    .device-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--n700); border: 1px solid var(--borda);
      border-radius: var(--radius-sm); padding: .6rem .95rem;
      margin-top: .5rem;
    }

    .device-row label { font-size: .6rem; letter-spacing: .12em; text-transform: uppercase; color: var(--n200); }
    .device-row .device-id { font-family: var(--font-mono); font-size: .8rem; color: var(--g300); }
    .device-row input { background: transparent; border: none; font-family: var(--font-mono); font-size: .8rem; color: var(--g300); outline: none; width: 100px; text-align: right; }

    .login-footer { text-align: center; margin-top: 1.5rem; font-size: .72rem; color: var(--n200); }
    .login-footer a { color: var(--g300); }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-logo">
    <img src="assets/logo-abcl.png" alt="ABCL" />
    <div class="login-logo-text">
      ABCL
      <small>Plataforma do Acampamento</small>
    </div>
  </div>

  <div class="login-card">
    <h1>Acesso restrito</h1>
    <p>Entre com suas credenciais de operador</p>

    <div class="error-box" id="err">Usuário ou senha incorretos.</div>

    <div class="form-stack">
      <div class="field">
        <label>Usuário</label>
        <input type="text" id="user" placeholder="seu usuário" autocomplete="username" autofocus />
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()" />
      </div>
    </div>

    <!-- Device ID editável -->
    <div class="device-row">
      <label>ID do dispositivo</label>
      <input type="text" id="dev-input" maxlength="12" title="Identificador único deste dispositivo" />
    </div>

    <button class="btn btn-g btn-full btn-lg fade-up" onclick="doLogin()" style="margin-top:1.5rem;">
      Entrar
    </button>

    <p class="login-footer">
      Após login, o sistema opera <strong>offline</strong> e sincroniza automaticamente.<br>
      <a href="index.html">← Voltar ao site</a>
    </p>
  </div>
</div>

<script src="js/core.js"></script>
<script>
  // Preenche device ID no input
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('dev-input').value = DeviceID.get();
  });

  function doLogin() {
    // Salva device id customizado
    const devVal = document.getElementById('dev-input').value.trim().toUpperCase();
    if (devVal) DeviceID.set(devVal);

    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;

    if (Auth.login(u, p)) {
      // Redireciona para onde veio (ou dashboard)
      const next = new URLSearchParams(location.search).get('next') || 'admin.html';
      window.location.href = next;
    } else {
      document.getElementById('err').style.display = 'block';
      document.getElementById('pass').value = '';
      document.getElementById('pass').focus();
    }
  }

  // Se já logado, redireciona direto
  if (Auth.session()) {
    window.location.href = new URLSearchParams(location.search).get('next') || 'admin.html';
  }
</script>
</body>
</html>
